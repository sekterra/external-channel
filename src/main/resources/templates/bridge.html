<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::content}, ~{::toolbarContent})}">
<head>
  <meta charset="utf-8"/>
  <title th:fragment="title">본인인증</title>
</head>
<body>
  <div th:fragment="toolbarContent"></div>
  <div th:fragment="content">
    <div class="block block-strong inset">
      <p class="block-title">브리지</p>
      <p th:if="${param.error == null}">본인인증 진행 중...</p>
      <p th:if="${param.error != null}" class="color-red">인증에 실패했습니다. 다시 시도해 주세요.</p>
      <form th:action="@{/bridge/verify}" method="post">
        <input type="hidden" th:name="token" th:value="${token}"/>
        <div class="block inset">
          <button type="submit" class="button button-large">PASS 인증 시작</button>
        </div>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      </form>
    </div>
  </div>
</body>
</html>
